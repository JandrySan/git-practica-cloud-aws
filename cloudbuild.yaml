steps:
  # 1. Build de la imagen del frontend apuntando a su ruta correcta
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '--no-cache', 
      '-t', 'us-west1-docker.pkg.dev/project-c37db799-6063-4bcf-835/restaurante/frontend:$COMMIT_SHA', 
      '-f', 'frontend/Dockerfile', # <--- Encuentra el Dockerfile dentro de la carpeta frontend
      '.'                          # <--- CAMBIADO: Usa la raíz como contexto general
    ]

  # 2. Push de la imagen a Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-west1-docker.pkg.dev/project-c37db799-6063-4bcf-835/restaurante/frontend:$COMMIT_SHA']

  # 3. Despliegue en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - git-practica-cloud-aws
      - --image=us-west1-docker.pkg.dev/project-c37db799-6063-4bcf-835/restaurante/frontend:$COMMIT_SHA
      - --region=us-west1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080

options:
  logging: CLOUD_LOGGING_ONLY