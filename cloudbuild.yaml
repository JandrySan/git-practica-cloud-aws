
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/restaurante-frontend', './frontend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/restaurante-frontend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - restaurante-frontend
      - --image=gcr.io/$PROJECT_ID/restaurante-frontend
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080